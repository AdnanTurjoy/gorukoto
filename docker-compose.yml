services:
  redis:
    image: redis:7-alpine
    container_name: gorukoi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gorukoi-backend
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    # DATABASE_URL, JWT_SECRET, etc. come from backend/.env.
    # The values below are container-only overrides for host references.
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gorukoi-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:3000/api
    ports:
      - "5173:5173"
